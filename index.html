<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QOS ISEAS JV</title>
    
    <meta property="og:title" content="QOS ISEAS JV">
    <meta property="og:description" content="Visit Our Office">
    <meta property="og:image" content="https://raw.githubusercontent.com/Admin-QI7/location/main/1.png">

    <style>
        body { 
            background-color: #f0f2f5; 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border-top: 10px solid #4A2C6D; /* Your Purple */
            max-width: 350px;
        }
        .logo { width: 150px; margin-bottom: 20px; }
        h1 { color: #4A2C6D; margin-bottom: 5px; font-size: 24px; }
        p { color: #666; margin-bottom: 30px; }
        .btn { 
            background-color: #4A2C6D; 
            color: white; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="1.png" class="logo">
        <h1>QOS ISEAS JV</h1>
        <p>Visit Our Office</p>
        
        <a href="https://maps.app.goo.gl/ha1LEG7z5dkcxEXy9" class="btn">Open in Google Maps</a>
    </div>
</body>
</html>
