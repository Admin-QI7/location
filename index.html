<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>QOS ISEAS JV - Office Location</title>
    <meta property="og:title" content="QOS ISEAS JV">
    <meta property="og:description" content="Visit Our Office. Click to open directions in Google Maps.">
    <meta property="og:image" content="https://raw.githubusercontent.com/Admin-QI7/location/main/1.png">
    <meta property="og:type" content="website">

    <style>
        :root {
            --purple: #4A2C6D;
            --gold: #F9A825;
            --blue: #1976D2;
            --light-bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .card {
            background: white;
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 8px solid var(--purple);
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--purple);
            font-size: 24px;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--purple), var(--blue));
            color: white;
            padding: 18px 35px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(74, 44, 109, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(74, 44, 109, 0.4);
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="1.png" alt="QOS ISEAS JV Logo" class="logo">
        
        <h1>QOS ISEAS JV</h1>
        <p>Visit Our Office</p>

        <a href="https://goo.gl/maps/https://maps.app.goo.gl/piNwJP8kJG8Fa7uKA" class="btn">
            Get Directions
        </a>

        <div class="footer">QOS ISEAS JV Sdn Bhd</div>
    </div>

</body>
</html>
